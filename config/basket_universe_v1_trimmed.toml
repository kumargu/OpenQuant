# basket_universe_v1_trimmed.toml — RESEARCH-ONLY
# In-sample drop list from per-basket Sharpe ranking on Jul-25 to Mar-26 baseline run.
# Dropped traded_targets (Sharpe < -1.0): AEP, GOOGL, HBAN, INTU, KEY, META, NVDA, PGR, SO, TRV
# These remain as PEERS where applicable — only their target-side basket is removed.
# WARNING: in-sample filter, will overfit. Compare against baseline as a "headroom test", not a deployable config.

[version]
schema = "basket_universe"
version = "v1"
frozen_at = "2026-04-20"
baseline_sharpe_point = 2.8
baseline_ci_95_lo = 1.26
baseline_ci_95_hi = 3.18
baseline_ci_method = "fit-date-clustered bootstrap (hierarchical)"

[strategy]
method = "basket_spread_ou_bertram"
spread_formula = "log(target) - mean(log(peers))"
threshold_method = "bertram_symmetric"
threshold_clip_min = 0.15
threshold_clip_max = 2.5
residual_window_days = 60
forward_window_days = 60
refit_cadence = "quarterly"
cost_bps_assumed = 5.0
leverage_assumed = 4.0
sizing = "equal_weight_across_baskets"

[dont_do]
hl_trade_gate = false
time_based_exit = false
stop_loss = false
regime_derisk = false
continuous_sizing = false
score_based_ranking = false
hl_derived_max_hold = false
pair_engine_reuse = false

[runner]
decision_offset_minutes_before_close = 0

[sectors.chips]
members = [ "NVDA", "AVGO", "AMD", "INTC", "MU", "ADI",]
traded_targets = [ "AMD", "INTC", "ADI", "MU",]

[sectors.hc_providers]
members = [ "UNH", "CI", "HUM", "CNC", "ELV", "MOH",]
traded_targets = [ "UNH", "CI", "HUM", "CNC", "ELV", "MOH",]

[sectors.energy]
members = [ "XOM", "CVX", "COP", "OXY", "MPC", "PSX",]
traded_targets = [ "XOM", "CVX", "COP", "OXY", "MPC", "PSX",]

[sectors.entsw]
members = [ "MSFT", "ORCL", "CRM", "ADBE", "INTU", "IBM",]
traded_targets = [ "ORCL", "CRM", "ADBE",]

[sectors.utilities]
members = [ "NEE", "DUK", "SO", "D", "AEP", "EXC",]
traded_targets = [ "NEE", "DUK", "D", "EXC",]

[sectors.banks_regional]
members = [ "USB", "PNC", "TFC", "KEY", "HBAN", "RF",]
traded_targets = [ "USB", "PNC", "TFC", "RF",]

[sectors.faang]
members = [ "AAPL", "AMZN", "MSFT", "GOOGL", "META", "NVDA",]
traded_targets = [ "AAPL", "AMZN",]

[sectors.insurance]
members = [ "ALL", "TRV", "PGR", "AIG", "MET", "PRU",]
traded_targets = [ "ALL", "AIG", "MET", "PRU",]
