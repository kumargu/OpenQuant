# basket_universe_india.template.toml
# Research starter for India-market basket construction.
# This file is intentionally labeled a template: sector membership still needs
# verification from NSE/BSE universes before live or paper promotion.

[version]
schema = "basket_universe"
version = "v1"
frozen_at = "2026-05-31"

[strategy]
method = "basket_spread_ou_bertram"
spread_formula = "log(target) - mean(log(peers))"
threshold_method = "bertram_symmetric"
threshold_clip_min = 0.15
threshold_clip_max = 2.5
residual_window_days = 60
forward_window_days = 60
refit_cadence = "quarterly"
cost_bps_assumed = 10.0
leverage_assumed = 2.0
sizing = "equal_weight_across_baskets"
dominance_gate_enabled = true
dominance_max = 0.60

[sectors.private_banks]
members = ["HDFCBANK", "ICICIBANK", "AXISBANK", "KOTAKBANK", "INDUSINDBK", "IDFCFIRSTB"]
traded_targets = ["HDFCBANK", "ICICIBANK", "AXISBANK", "KOTAKBANK"]

[sectors.it_services]
members = ["TCS", "INFY", "WIPRO", "HCLTECH", "TECHM", "PERSISTENT"]
traded_targets = ["TCS", "INFY", "HCLTECH", "TECHM"]

[sectors.auto_oems]
members = ["MARUTI", "M&M", "TVSMOTOR", "BAJAJ-AUTO", "EICHERMOT", "HEROMOTOCO"]
traded_targets = ["MARUTI", "M&M", "TVSMOTOR", "BAJAJ-AUTO"]

[sectors.pharma]
members = ["SUNPHARMA", "DRREDDY", "CIPLA", "DIVISLAB", "LUPIN", "AUROPHARMA"]
traded_targets = ["SUNPHARMA", "DRREDDY", "CIPLA", "DIVISLAB"]

[sectors.oil_gas]
members = ["RELIANCE", "ONGC", "IOC", "BPCL", "HINDPETRO", "GAIL"]
traded_targets = ["RELIANCE", "ONGC", "IOC", "BPCL"]

[sectors.financial_services_ex_banks]
members = ["BAJFINANCE", "JIOFIN", "SBILIFE", "HDFCLIFE", "ICICIGI", "MCX"]
traded_targets = ["BAJFINANCE", "JIOFIN", "SBILIFE", "HDFCLIFE"]

[sectors.capital_markets]
members = ["BSE", "CDSL", "CAMS", "KFINTECH", "MCX", "360ONE"]
traded_targets = ["BSE", "CDSL", "CAMS", "KFINTECH"]

[sectors.cement]
members = ["ULTRACEMCO", "SHREECEM", "AMBUJACEM", "ACC", "DALBHARAT", "JKCEMENT"]
traded_targets = ["ULTRACEMCO", "SHREECEM", "AMBUJACEM", "ACC"]

[sectors.metals]
members = ["TATASTEEL", "JSWSTEEL", "HINDALCO", "JINDALSTEL", "NMDC", "SAIL"]
traded_targets = ["TATASTEEL", "JSWSTEEL", "HINDALCO", "JINDALSTEL"]

[sectors.chemicals]
members = ["PIDILITIND", "SRF", "DEEPAKNTR", "NAVINFLUOR", "AARTIIND", "TATACHEM"]
traded_targets = ["PIDILITIND", "SRF", "DEEPAKNTR", "NAVINFLUOR"]

[sectors.consumer_durables]
members = ["TITAN", "VOLTAS", "WHIRLPOOL", "DIXON", "HAVELLS", "CROMPTON"]
traded_targets = ["TITAN", "VOLTAS", "WHIRLPOOL", "DIXON"]

[runner]
decision_offset_minutes_before_close = 0

[runner.portfolio]
capital = 10000
n_active_baskets = 5

[runner.leadership_overlay]
sectors = ["private_banks", "it_services"]
on_ret5d_threshold = 0.02
on_breadth5d_threshold = 0.56
off_ret5d_threshold = 0.0
off_breadth5d_threshold = 0.5
persistence_days = 2
min_hold_days = 3
picker = "fixed"
long_only_leverage = 1.0
