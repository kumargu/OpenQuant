# basket_universe.toml — FROZEN UNIVERSE CONFIG (production default)
# ----------------------------------------------------------------------
# This file defines the exact universe the production engine trades.
# The runner reads it by default for `--engine basket`.
#
# Frozen: 2026-05-04
# Research basis: issue #321 frozen-rule walk-forward across 4 OOS blocks
#   (2024-07 -> 2026-03), 5 variants compared. dom060 (this file) was
#   chosen — dual-OOS lift +0.58 / +2.59 vs no-gate basket-only reference, mean +1.03,
#   12 baskets always rejected for single-name dominance.
#
# Differences vs the prior frozen basket universe:
#   - mining sector dropped (cointegration fragile across gold / steel /
#     aggregates macro drivers; metals replacement deferred to a later
#     frozen revision).
#   - dominance_gate_enabled = true with dominance_max = 0.60. Rejects
#     baskets where any single member contributes >60% of spread variance.
#
# Walk-forward Sharpe (5 bps cost, 4x leverage, 8 active baskets,
#   $10k capital):
#     test0 (2024-07..2024-12, OOS): +1.79
#     test1 (2025-01..2025-06, OOS): +3.08
#     test2 (2025-07..2025-12):      +1.64
#     test3 (2026-01..2026-03):      +2.73
#   mean +2.31 / min +1.64.
#
# DO NOT EDIT THIS FILE WITHOUT:
#   1. Re-running the walk-forward across the 4 OOS blocks.
#   2. Opening a GitHub issue describing the change and the experimental
#      evidence that justified it.
#   3. Updating the reference metrics below.
# ----------------------------------------------------------------------

[version]
schema = "basket_universe"
version = "v1"
frozen_at = "2026-05-04"

[strategy]
method = "basket_spread_ou_bertram"
spread_formula = "log(target) - mean(log(peers))"
threshold_method = "bertram_symmetric"
threshold_clip_min = 0.15
threshold_clip_max = 2.5
residual_window_days = 60
forward_window_days = 60
refit_cadence = "quarterly"
cost_bps_assumed = 5.0
leverage_assumed = 4.0
sizing = "equal_weight_across_baskets"
dominance_gate_enabled = true
dominance_max = 0.60

# Sector groups: { target } traded vs { other members of group }
# Exactly 9 sectors × 6 members each = 54 candidate baskets
# (subset of 49 targets after AVGO/MSFT/NVDA exclusions — see notes)

[sectors.chips]
members = ["NVDA", "AVGO", "AMD", "INTC", "MU", "ADI"]
traded_targets = ["AMD", "INTC", "ADI", "MU", "NVDA"]  # AVGO excluded (cursed in this peer set)

[sectors.hc_providers]
members = ["UNH", "CI", "HUM", "CNC", "ELV", "MOH"]
traded_targets = ["UNH", "CI", "HUM", "CNC", "ELV", "MOH"]

[sectors.energy]
members = ["XOM", "CVX", "COP", "OXY", "MPC", "PSX"]
traded_targets = ["XOM", "CVX", "COP", "OXY", "MPC", "PSX"]

[sectors.entsw]
members = ["MSFT", "ORCL", "CRM", "ADBE", "INTU", "IBM"]
traded_targets = ["ORCL", "CRM", "ADBE", "INTU"]  # MSFT and IBM excluded

[sectors.utilities]
members = ["NEE", "DUK", "SO", "D", "AEP", "EXC"]
traded_targets = ["NEE", "DUK", "SO", "D", "AEP", "EXC"]

[sectors.banks_regional]
members = ["USB", "PNC", "TFC", "KEY", "HBAN", "RF"]
traded_targets = ["USB", "PNC", "TFC", "KEY", "HBAN", "RF"]

[sectors.faang]
members = ["AAPL", "AMZN", "MSFT", "GOOGL", "META", "NVDA"]
traded_targets = ["AAPL", "GOOGL", "META", "AMZN"]  # MSFT and NVDA excluded

[sectors.insurance]
members = ["ALL", "TRV", "PGR", "AIG", "MET", "PRU"]
traded_targets = ["ALL", "TRV", "PGR", "AIG", "MET", "PRU"]

# ----------------------------------------------------------------------
# Explicitly EXCLUDED from v1 (see project_statarb_autoresearch_findings.md):
#   - biotech, big_retail, pharma, reits — net-negative mean contribution
#   - industrials, payments, defense, banks_money — marginal, within CI noise
#
# Candidates for the buildout regime (NOT to be added without re-running the full gauntlet):
#   - Box-Tiao weights instead of equal-weight
#   - Vine-copula partner selection
#   - Ex-ante sector rotation (weak signal ρ=0.12, needs more research)
# ----------------------------------------------------------------------

[dont_do]
hl_trade_gate = false       # DO NOT re-introduce absolute HL as trade filter
time_based_exit = false     # DO NOT close at mult × half-life
stop_loss = false           # DO NOT exit on adverse spread move
regime_derisk = false       # DO NOT size-down at extreme |s| (was a bug)
continuous_sizing = false   # DO NOT use linear-in-z sizing (loses to Bertram)
score_based_ranking = false # DO NOT sort baskets by HL-derived score
hl_derived_max_hold = false # DO NOT derive max_hold from half-life
pair_engine_reuse = false   # DO NOT port by adapting PairsEngine / PairConfig

[runner]
# Last RTH bar production behavior. Kept here for universe compatibility;
# basket paper/live currently make decisions from the session-close trigger.
decision_offset_minutes_before_close = 0

[runner.portfolio]
# Default basket runtime sizing used by paper/live/replay unless CLI overrides it.
capital = 10000
n_active_baskets = 5

[runner.leadership_overlay]
# Default basket overlay/governor profile used by paper/live/replay.
# Keep CLI overrides available for one-off experiments, but normal runs should
# be able to launch without repeating these flags.
sectors = ["faang", "chips"]
on_ret5d_threshold = 0.02
on_breadth5d_threshold = 0.56
off_ret5d_threshold = 0.0
off_breadth5d_threshold = 0.5
persistence_days = 2
min_hold_days = 3
picker = "rule_v1"
long_only_leverage = 1.0

[runner.leadership_overlay.rule_v1]
min_dwell_days = 5
off_confirmation_days = 2
suppress_conflict_on_threshold = 0.15
suppress_conflict_off_threshold = 0.05
weak_return_threshold = 0.0
drawdown_on_threshold = 0.05
recovered_return_threshold = 0.03
recovered_drawdown_threshold = 0.03
sleeve_return_ceiling = 0.03
min_basket_only_scale_for_sleeve = 0.70
opportunistic_sleeve_min_basket_only_scale = 0.85
opportunistic_sleeve_return_ceiling = 0.10
halve_sleeve_drawdown_threshold = 0.05
quarter_sleeve_drawdown_threshold = 0.10
