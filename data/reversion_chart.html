    const card = document.createElement('div');
    card.className = 'pair-card';
    const pct3 = info.avg_abs.length > 3 ? Math.round((1 - info.avg_abs[3]/info.avg_abs[0])*100) : 0;
    const pct7 = info.avg_abs.length > 7 ? Math.round((1 - info.avg_abs[7]/info.avg_abs[0])*100) : 0;
    card.innerHTML = `<h2 style="color:#58a6ff">${pair}</h2>
      <span class="stat">Entries: <b>${info.n_entries}</b></span>
      <span class="stat">3-day reversion: <b>${pct3}%</b></span>
      <span class="stat">7-day reversion: <b>${pct7}%</b></span>

    const canvas = document.createElement('canvas');
    canvas.width = 800; canvas.height = 300;
    card.appendChild(canvas);
    container.appendChild(card);
    drawPaths(canvas, info);
  }

function drawPaths(canvas, info) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {t:30,b:30,l:50,r:20};
  const pW = W-pad.l-pad.r, pH = H-pad.t-pad.b;
  const days = info.avg_abs.length;
  const maxZ = 4;
  const xP = d => pad.l + (d/(days-1))*pW;
  const yP = z => pad.t + pH/2 - (z/maxZ)*(pH/2);
  // Grid
  ctx.strokeStyle='#21262d'; ctx.lineWidth=0.5;
  for (let z = -3; z <= 3; z++) {
    ctx.beginPath(); ctx.moveTo(pad.l, yP(z)); ctx.lineTo(W-pad.r, yP(z)); ctx.stroke();
    ctx.fillStyle='#484f58'; ctx.font='10px monospace';
    ctx.fillText(z.toString(), 5, yP(z)+4);
  }
  // Zero line
  ctx.strokeStyle='#484f58'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l, yP(0)); ctx.lineTo(W-pad.r, yP(0)); ctx.stroke();
  // Entry threshold
  ctx.strokeStyle='#f8514944'; ctx.lineWidth=1; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(pad.l, yP(2)); ctx.lineTo(W-pad.r, yP(2)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.l, yP(-2)); ctx.lineTo(W-pad.r, yP(-2)); ctx.stroke();
  ctx.setLineDash([]);
  // Exit threshold
  ctx.strokeStyle='#3fb95044'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(pad.l, yP(0.5)); ctx.lineTo(W-pad.r, yP(0.5)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.l, yP(-0.5)); ctx.lineTo(W-pad.r, yP(-0.5)); ctx.stroke();
  ctx.setLineDash([]);
  // Individual paths (gray)
  for (const path of info.paths) {
    ctx.strokeStyle='rgba(200,200,200,0.15)'; ctx.lineWidth=1;
    ctx.beginPath();
    path.forEach((z,d) => d===0 ? ctx.moveTo(xP(d),yP(z)) : ctx.lineTo(xP(d),yP(z)));
    ctx.stroke();
  }
  // Average |z| path (green)
  if (info.avg_abs.length) {
    ctx.strokeStyle='#3fb950'; ctx.lineWidth=3;
    ctx.beginPath();
    info.avg_abs.forEach((z,d) => d===0 ? ctx.moveTo(xP(d),yP(z)) : ctx.lineTo(xP(d),yP(z)));
    ctx.stroke();
    // Also draw negative mirror
    ctx.strokeStyle='#3fb95088'; ctx.lineWidth=2;
    ctx.beginPath();
    info.avg_abs.forEach((z,d) => d===0 ? ctx.moveTo(xP(d),yP(-z)) : ctx.lineTo(xP(d),yP(-z)));
    ctx.stroke();
  }
  // Day labels
  ctx.fillStyle='#8b949e'; ctx.font='11px monospace';
  for (let d=0; d<days; d++) ctx.fillText('D'+d, xP(d)-8, H-8);
  ctx.fillText('entry z=±2', pad.l+5, 18);
}
