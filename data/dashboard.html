const pairSelect = document.getElementById('pairSelect');
const tooltip = document.getElementById('tooltip');

// Populate dropdown
Object.keys(dashboard.pairs).sort((a,b) => a === 'ALL' ? -1 : b === 'ALL' ? 1 : a.localeCompare(b))
  .forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    pairSelect.appendChild(opt);
  });

pairSelect.addEventListener('change', () => render(pairSelect.value));

function render(pairName) {
  const data = dashboard.pairs[pairName];
  if (!data || !data.length) return;

  document.getElementById('subtitle').textContent =
    `${data.length} trading days | Generated ${dashboard.generated_at} | Config: ${dashboard.config}`;

  // ── Stats ──
  let cum = 0, peak = 0, maxDD = 0;
  const equity = data.map(d => { cum += d.dollar_pnl; peak = Math.max(peak, cum); maxDD = Math.min(maxDD, cum - peak); return {...d, cum_pnl: cum}; });
  const totalPnl = cum;
  const winDays = data.filter(d => d.dollar_pnl > 0).length;
  const avgWin = data.filter(d => d.dollar_pnl > 0).reduce((s,d) => s + d.dollar_pnl, 0) / (winDays || 1);
  const lossDays = data.filter(d => d.dollar_pnl < 0);
  const avgLoss = lossDays.reduce((s,d) => s + d.dollar_pnl, 0) / (lossDays.length || 1);
  const returns = data.map(d => d.dollar_pnl);
  const mean = returns.reduce((a,b) => a+b, 0) / returns.length;
  const std = Math.sqrt(returns.map(r => (r-mean)**2).reduce((a,b)=>a+b,0) / returns.length);
  const sharpe = std > 0 ? (mean / std) * Math.sqrt(252) : 0;
  const best = data.reduce((a,b) => a.dollar_pnl > b.dollar_pnl ? a : b);
  const worst = data.reduce((a,b) => a.dollar_pnl < b.dollar_pnl ? a : b);

  const c = v => v >= 0 ? '#3fb950' : '#f85149';
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val" style="color:${c(totalPnl)}">$${totalPnl.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="stat-label">Total P&L</div></div>
    <div class="stat"><div class="stat-val" style="color:${c(mean)}">$${mean.toFixed(0)}</div><div class="stat-label">Avg $/day</div></div>
    <div class="stat"><div class="stat-val">${winDays}/${data.length}</div><div class="stat-label">Win days (${(winDays/data.length*100).toFixed(0)}%)</div></div>
    <div class="stat"><div class="stat-val" style="color:#3fb950">$${avgWin.toFixed(0)}</div><div class="stat-label">Avg win day</div></div>
    <div class="stat"><div class="stat-val" style="color:#f85149">$${avgLoss.toFixed(0)}</div><div class="stat-label">Avg loss day</div></div>
    <div class="stat"><div class="stat-val" style="color:#f85149">$${maxDD.toFixed(0)}</div><div class="stat-label">Max drawdown</div></div>
    <div class="stat"><div class="stat-val">${sharpe.toFixed(2)}</div><div class="stat-label">Sharpe (ann.)</div></div>
    <div class="stat"><div class="stat-val" style="color:#3fb950">$${best.dollar_pnl.toFixed(0)}</div><div class="stat-label">Best (${best.date})</div></div>
    <div class="stat"><div class="stat-val" style="color:#f85149">$${worst.dollar_pnl.toFixed(0)}</div><div class="stat-label">Worst (${worst.date})</div></div>
  `;

  // ── Draw charts ──
  drawEquity(equity);
  drawDaily(data);
  drawMonthly(data);
  drawHeatmap(data);
}

function chartSetup(canvasId) {
  const canvas = document.getElementById(canvasId);
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = {t: 30, b: 35, l: 65, r: 15};
  return {canvas, ctx, W, H, pad, plotW: W-pad.l-pad.r, plotH: H-pad.t-pad.b};
}

function drawGrid(ctx, pad, W, H, plotH, minY, maxY, steps) {
  const range = maxY - minY || 1;
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  ctx.fillStyle = '#484f58'; ctx.font = '11px monospace';
  for (let i = 0; i <= steps; i++) {
    const v = minY + (range * i / steps);
    const y = pad.t + plotH - ((v - minY) / range) * plotH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillText('$' + v.toFixed(0), 4, y + 4);
  }
  // zero line
  const zy = pad.t + plotH - ((0 - minY) / range) * plotH;
  ctx.strokeStyle = '#484f58'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.l, zy); ctx.lineTo(W-pad.r, zy); ctx.stroke();
}

function drawMonthTicks(ctx, data, pad, W, H, plotW) {
  let last = '';
  ctx.fillStyle = '#484f58'; ctx.font = '10px monospace';
  data.forEach((d, i) => {
    const m = d.date.substring(0, 7);
    if (m !== last) {
      last = m;
      const x = pad.l + (i / (data.length-1)) * plotW;
      ctx.fillText(m, x, H - 5);
      ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H-pad.b); ctx.stroke();
    }
  });
}

function drawEquity(data) {
  const {canvas, ctx, W, H, pad, plotW, plotH} = chartSetup('equityChart');
  const vals = data.map(d => d.cum_pnl);
  const minY = Math.min(0, ...vals), maxY = Math.max(0, ...vals);
  const range = maxY - minY || 1;
  const xP = i => pad.l + (i / (data.length-1)) * plotW;
  const yP = v => pad.t + plotH - ((v - minY) / range) * plotH;

  drawGrid(ctx, pad, W, H, plotH, minY, maxY, 5);
  drawMonthTicks(ctx, data, pad, W, H, plotW);

  // Fill
  ctx.beginPath(); ctx.moveTo(xP(0), yP(0));
  data.forEach((d, i) => ctx.lineTo(xP(i), yP(d.cum_pnl)));
  ctx.lineTo(xP(data.length-1), yP(0)); ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.t, 0, H-pad.b);
  grad.addColorStop(0, 'rgba(63, 185, 80, 0.25)'); grad.addColorStop(1, 'rgba(63, 185, 80, 0.02)');
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.strokeStyle = '#3fb950'; ctx.lineWidth = 2; ctx.beginPath();
  data.forEach((d, i) => i === 0 ? ctx.moveTo(xP(i), yP(d.cum_pnl)) : ctx.lineTo(xP(i), yP(d.cum_pnl)));
  ctx.stroke();

  // Drawdown shading
  let peak = 0;
  ctx.fillStyle = 'rgba(248, 81, 73, 0.15)';
  data.forEach((d, i) => {
    peak = Math.max(peak, d.cum_pnl);
    if (d.cum_pnl < peak) {
      ctx.fillRect(xP(i)-1, yP(peak), 3, yP(d.cum_pnl) - yP(peak));
    }
  });

  ctx.fillStyle = '#8b949e'; ctx.font = '12px monospace';
  ctx.fillText('Cumulative P&L', pad.l + 5, 20);

  // Tooltip
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.round(((e.clientX - rect.left) - pad.l) / plotW * (data.length - 1));
    if (idx >= 0 && idx < data.length) {
      const d = data[idx];
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.innerHTML = `<b>${d.date}</b><br>Day: <b style="color:${d.dollar_pnl>=0?'#3fb950':'#f85149'}">$${d.dollar_pnl.toFixed(0)}</b><br>Cum: <b>$${d.cum_pnl.toFixed(0)}</b><br>Trades: ${d.trades} | Win: ${d.win_rate}%`;
    }
  };
  canvas.onmouseout = () => tooltip.style.display = 'none';
}

function drawDaily(data) {
  const {ctx, W, H, pad, plotW, plotH} = chartSetup('dailyChart');
  const vals = data.map(d => d.dollar_pnl);
  const minY = Math.min(0, ...vals), maxY = Math.max(0, ...vals);
  const range = maxY - minY || 1;
  const yP = v => pad.t + plotH - ((v - minY) / range) * plotH;
  const barW = Math.max(2, plotW / data.length - 1);

  drawGrid(ctx, pad, W, H, plotH, minY, maxY, 4);

  data.forEach((d, i) => {
    const x = pad.l + (i / (data.length-1)) * plotW - barW/2;
    const zero = yP(0), top = yP(d.dollar_pnl);
    ctx.fillStyle = d.dollar_pnl >= 0 ? '#238636' : '#da3633';
    ctx.fillRect(x, Math.min(zero, top), barW, Math.abs(zero - top));
  });

  let last = ''; ctx.fillStyle = '#484f58'; ctx.font = '10px monospace';
  data.forEach((d, i) => { const m = d.date.substring(0,7); if (m !== last) { last = m; ctx.fillText(m, pad.l + (i/(data.length-1))*plotW, H-5); }});
  ctx.fillStyle = '#8b949e'; ctx.font = '12px monospace'; ctx.fillText('Daily P&L', pad.l + 5, 20);
}

function drawMonthly(data) {
  const {ctx, W, H, pad, plotW, plotH} = chartSetup('monthlyChart');
  const monthly = {};
  data.forEach(d => { const m = d.date.substring(0,7); monthly[m] = (monthly[m]||0) + d.dollar_pnl; });
  const months = Object.keys(monthly).sort();
  const vals = months.map(m => monthly[m]);
  const minY = Math.min(0, ...vals), maxY = Math.max(0, ...vals);
  const range = maxY - minY || 1;
  const yP = v => pad.t + plotH - ((v - minY) / range) * plotH;
  const barW = Math.min(50, plotW / months.length - 6);

  drawGrid(ctx, pad, W, H, plotH, minY, maxY, 4);

  months.forEach((m, i) => {
    const x = pad.l + (i + 0.5) * (plotW / months.length);
    const zero = yP(0), top = yP(vals[i]);
    ctx.fillStyle = vals[i] >= 0 ? '#238636' : '#da3633';
    const r = 3;
    const bx = x - barW/2, by = Math.min(zero, top), bh = Math.abs(zero - top);
    ctx.beginPath();
    ctx.moveTo(bx + r, by); ctx.lineTo(bx + barW - r, by);
    ctx.quadraticCurveTo(bx + barW, by, bx + barW, by + r);
    ctx.lineTo(bx + barW, by + bh); ctx.lineTo(bx, by + bh);
    ctx.lineTo(bx, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by);
    ctx.fill();
    // Label
    ctx.fillStyle = '#c9d1d9'; ctx.font = '10px monospace';
    ctx.fillText('$' + vals[i].toFixed(0), x - 18, vals[i] >= 0 ? top - 5 : top + 13);
    ctx.fillStyle = '#8b949e'; ctx.fillText(m.substring(2), x - 14, H - 5);
  });
  ctx.fillStyle = '#8b949e'; ctx.font = '12px monospace'; ctx.fillText('Monthly P&L', pad.l + 5, 20);
}

function drawHeatmap(data) {
  const container = document.getElementById('heatmap');
  container.innerHTML = '';
  const byMonth = {};
  data.forEach(d => { const m = d.date.substring(0,7); (byMonth[m] = byMonth[m] || []).push(d); });

  function pnlColor(v) {
    if (v > 500) return '#1a7f37'; if (v > 200) return '#238636'; if (v > 50) return '#2ea043';
    if (v > 0) return '#3fb950'; if (v > -50) return '#f89898'; if (v > -100) return '#f85149';
    if (v > -200) return '#da3633'; return '#b62324';
  }

  const table = document.createElement('table');
  table.style.cssText = 'border-collapse:collapse; margin-top:6px;';
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  Object.keys(byMonth).sort().forEach(month => {
    const days = byMonth[month].sort((a,b) => a.date.localeCompare(b.date));
    const tr = document.createElement('tr');
    const label = document.createElement('td');
    const [y,m] = month.split('-');
    label.textContent = `${months[parseInt(m)]} ${y}`;
    label.style.cssText = 'font-size:13px; color:#8b949e; padding:3px 10px; width:80px; font-weight:bold;';
    tr.appendChild(label);
    days.forEach(d => {
      const td = document.createElement('td');
      td.style.cssText = `width:36px; height:36px; border:2px solid #0d1117; border-radius:4px; cursor:pointer; background:${pnlColor(d.dollar_pnl)};`;
      td.onmouseover = e => {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX+15)+'px'; tooltip.style.top = (e.clientY-10)+'px';
        tooltip.innerHTML = `<b>${d.date}</b><br>P&L: <b style="color:${d.dollar_pnl>=0?'#3fb950':'#f85149'}">$${d.dollar_pnl.toFixed(0)}</b><br>Trades: ${d.trades}<br>Win: ${d.win_rate}%`;
      };
      td.onmouseout = () => tooltip.style.display = 'none';
      tr.appendChild(td);
    });
    for (let i = days.length; i < 23; i++) {
      const td = document.createElement('td');
      td.style.cssText = 'width:36px; height:36px; border:2px solid #0d1117; background:#0d1117;';
      tr.appendChild(td);
    }
    table.appendChild(tr);
  });
  container.appendChild(table);
}

// Initial render
render('ALL');
</script>
