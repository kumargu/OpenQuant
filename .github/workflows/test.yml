name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust tests + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace

      - name: Integration tests (cross-module contracts)
        run: cargo test -p openquant-core -- pairs::engine::tests::test_integration

      - name: Performance gate (engine)
        run: cargo test --test bench_gate --release -p openquant-core -- --ignored

      - name: Performance gate (journal SQLite)
        run: cargo test --test bench_gate --release -p openquant-journal -- --ignored

  python-bridge:
    name: Python bridge build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-py-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-py-${{ runner.os }}-

      - name: Create virtualenv and install maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin

      - name: Build extension
        working-directory: engine
        run: |
          source ../.venv/bin/activate
          maturin develop --release

      - name: Verify import
        run: |
          source .venv/bin/activate
          python -c "import openquant; print(f'openquant loaded: {dir(openquant)}')"
