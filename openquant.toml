# OpenQuant Configuration
# Tweak parameters here instead of changing code.
# CLI flags and Python kwargs override these values.

[metrics]
enabled = true

[signal]
buy_z_threshold = -2.2
sell_z_threshold = 2.0
min_relative_volume = 1.2
min_score = 0.5
trend_filter = true

[risk]
max_position_notional = 10_000.0
max_daily_loss = 500.0
min_reward_cost_ratio = 3.0
estimated_cost_bps = 0.001

[exit]
stop_loss_pct = 0.0
stop_loss_atr_mult = 2.5
max_hold_bars = 100
take_profit_pct = 0.0

[data]
max_bar_age_seconds = 0      # 0 = disabled (for backtesting)

# Per-symbol overrides. Any key omitted uses the default above.
# [symbol_overrides.BTCUSD]
# buy_z_threshold = -2.5
# stop_loss_atr_mult = 3.0
#
# [symbol_overrides.ETHUSD]
# min_relative_volume = 1.5
